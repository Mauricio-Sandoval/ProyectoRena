<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas — Viajes CDMX</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>
    <main class="container">
        <div class="page-header">
            <h1>Todas las Reservas</h1>
            <p>Vista administrativa de todas las reservas del sistema</p>
        </div>
        <div id="reservas-list" class="loader"><div class="spinner"></div></div>
    </main>

    <!-- ORDEN DE SCRIPTS CRUCIAL -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/reservas.js"></script> <!-- Este debe cargar ANTES del script de abajo -->
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Iniciando reservas.html...');
            
            // Verificar que la función exista antes de llamarla
            if (typeof cargarReservasAdmin !== 'function') {
                console.error('❌ ERROR CRÍTICO: cargarReservasAdmin no está definida. Revisa js/reservas.js');
                document.getElementById('reservas-list').innerHTML = 
                    '<div class="alert alert-danger">Error de carga: No se pudo cargar el script de reservas. Revisa la consola (F12).</div>';
                return;
            }

            const profile = await requireRole('admin');
            if (!profile) return;
            
            renderNavbar(profile, [
                { href: 'admin.html', label: '🏠 Panel' },
                { href: 'conductores.html', label: '🚗 Conductores' },
                { href: 'viajes.html', label: '🚌 Viajes' },
                { href: 'reservas.html', label: '🎫 Reservas' }
            ]);
            
            await cargarReservasAdmin();
        });
    </script>
</body>
</html>
