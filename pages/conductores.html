<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conductores — Viajes CDMX</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>
    <main class="container">
        <div class="page-header">
            <h1>Gestión de Conductores</h1>
            <p>Administra el equipo de conductores</p>
        </div>

        <button class="btn btn-primary" id="btn-nuevo-conductor">+ Nuevo conductor</button>
        <div id="conductores-list" class="loader" style="margin-top:1rem;"><div class="spinner"></div></div>
    </main>

    <!-- Modal conductor -->
    <div class="modal-overlay" id="modal-conductor">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-conductor-title">Nuevo conductor</h2>
                <button class="modal-close" data-close="modal-conductor">&times;</button>
            </div>
            <form id="form-conductor">
                <input type="hidden" id="conductor-id">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="conductor-nombre" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="conductor-telefono" class="form-control">
                </div>
                <div class="form-group">
                    <label>Licencia</label>
                    <input type="text" id="conductor-licencia" class="form-control">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="conductor-activo" checked> Activo</label>
                </div>
                <button type="submit" class="btn btn-success">Guardar</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/conductores.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const profile = await requireRole('admin');
            if (!profile) return;
            renderNavbar(profile, [
                { href: 'admin.html', label: '🏠 Panel' },
                { href: 'conductores.html', label: '🚗 Conductores' },
                { href: 'viajes.html', label: '🚌 Viajes' },
                { href: 'reservas.html', label: '🎫 Reservas' }
            ]);
            await cargarConductoresAdmin();
            document.getElementById('btn-nuevo-conductor').addEventListener('click', () => abrirModalConductor());
            document.querySelectorAll('[data-close]').forEach(b =>
                b.addEventListener('click', () => document.getElementById(b.dataset.close).classList.remove('active'))
            );
        });
    </script>
</body>
</html>
